[build]
  # Wrapper retries the flaky TinaCMS step (occasional indexing deadlock)
  # with a per-attempt cap instead of hitting Netlify's build time limit.
  command = "bash scripts/netlify-build.sh"
  publish = "dist"

[build.environment]
  # The TinaCMS local build exceeds Node's default 2GB heap during indexing.
  NODE_OPTIONS = "--max-old-space-size=6144"
